<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MSS Protocol — Login</title>
<meta
name="description"
content="MSS Protocol Login — sign in to manage alerts and access account-linked blockchain security intelligence features."
/>
<link rel="stylesheet" href="./assets/app.css" />
<style>
.auth-page .wrap{
max-width:1120px;
margin:0 auto;
padding:28px 20px 88px;
position:relative;
z-index:1;
}

.auth-page .auth-grid{
display:grid;
grid-template-columns:.92fr 1.08fr;
gap:18px;
}

.auth-page .hero-shell,
.auth-page .auth-card{
position:relative;
border:1px solid var(--line);
border-radius:var(--radius-xl);
background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.026));
box-shadow:var(--shadow-lg);
overflow:hidden;
}

.auth-page .hero-shell::before,
.auth-page .auth-card::before{
content:"";
position:absolute;
inset:0;
pointer-events:none;
background:
linear-gradient(180deg, rgba(255,255,255,.04), transparent 28%),
radial-gradient(760px 220px at 0% 0%, rgba(243,217,139,.05), transparent 38%);
}

.auth-page .hero-shell,
.auth-page .auth-card{
padding:24px;
}

.auth-page .hero-shell > *,
.auth-page .auth-card > *{
position:relative;
z-index:1;
}

.auth-page .eyebrow{
display:inline-flex;
align-items:center;
gap:10px;
min-height:32px;
padding:0 12px;
border-radius:999px;
border:1px solid rgba(243,217,139,.18);
background:rgba(214,178,94,.08);
font-size:11px;
font-weight:800;
letter-spacing:.18em;
text-transform:uppercase;
color:#fff;
}

.auth-page .eyebrow-dot{
width:7px;
height:7px;
border-radius:999px;
background:var(--gold-2);
box-shadow:0 0 12px rgba(243,217,139,.26);
}

.auth-page .hero-title{
margin:18px 0 12px;
font-size:38px;
line-height:1.02;
letter-spacing:-.04em;
font-weight:900;
}

.auth-page .hero-copy{
color:var(--muted);
font-size:14px;
line-height:1.72;
}

.auth-page .hero-pills{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:18px;
}

.auth-page .hero-pill{
display:inline-flex;
align-items:center;
gap:8px;
min-height:34px;
padding:0 11px;
border-radius:999px;
border:1px solid rgba(255,255,255,.10);
background:rgba(255,255,255,.04);
font-size:12px;
color:rgba(255,255,255,.82);
}

.auth-page .section-title{
font-size:14px;
letter-spacing:.18em;
text-transform:uppercase;
color:rgba(255,255,255,.60);
font-weight:800;
margin:0 0 14px;
}

.auth-page .field-grid{
display:grid;
gap:12px;
}

.auth-page .field{
display:grid;
gap:8px;
}

.auth-page .label{
font-size:12px;
font-weight:700;
color:rgba(255,255,255,.78);
letter-spacing:.06em;
text-transform:uppercase;
}

.auth-page .input{
width:100%;
min-height:46px;
padding:0 14px;
border-radius:14px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.05);
color:var(--text);
outline:none;
font:inherit;
box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}

.auth-page .input:focus{
border-color:rgba(243,217,139,.24);
box-shadow:0 0 0 4px rgba(243,217,139,.08);
background:rgba(255,255,255,.06);
}

.auth-page .hp{
display:none !important;
}

.auth-page .check-row{
display:flex;
gap:10px;
align-items:flex-start;
padding:12px 14px;
border-radius:14px;
border:1px solid rgba(255,255,255,.10);
background:rgba(255,255,255,.04);
}

.auth-page .checkbox{
width:18px;
height:18px;
margin-top:2px;
accent-color:var(--gold-1);
flex:0 0 auto;
}

.auth-page .helper{
color:var(--muted);
font-size:12px;
line-height:1.6;
}

.auth-page .btn{
width:100%;
min-height:46px;
}

.auth-page .status{
min-height:20px;
margin-top:10px;
font-size:13px;
color:var(--muted);
line-height:1.5;
}

.auth-page .link-row{
display:grid;
gap:8px;
margin-top:14px;
}

.auth-page .link-row a{
color:rgba(255,255,255,.78);
font-size:12px;
}

.auth-page .link-row a:hover{
color:#fff;
}

@media (max-width:900px){
.auth-page .auth-grid{
grid-template-columns:1fr;
}
}

@media (max-width:760px){
.auth-page .hero-title{
font-size:32px;
}

.auth-page .hero-shell,
.auth-page .auth-card{
border-radius:22px;
padding:20px 16px;
}

.auth-page .wrap{
padding:22px 14px 80px;
}
}
</style>
</head>
<body class="auth-page">
<div id="layoutShellHeader"></div>

<div class="wrap">
<div class="auth-grid">
<section class="hero-shell">
<div class="eyebrow">
<span class="eyebrow-dot"></span>
<span>Account Access</span>
</div>

<h1 class="hero-title">Sign In To The MSS Intelligence Layer</h1>

<div class="hero-copy">
Login gives you access to account-linked monitoring, saved alerts, and future intelligence tooling
across the MSS ecosystem.
</div>

<div class="hero-pills">
<span class="hero-pill">Alerts</span>
<span class="hero-pill">Account-Linked Features</span>
<span class="hero-pill">Blockchain Security Intelligence</span>
</div>
</section>

<section class="auth-card">
<div class="section-title">Login</div>

<div class="field-grid">
<div class="field">
<label class="label" for="email">Email</label>
<input id="email" class="input" placeholder="Email" type="email" autocomplete="email" />
</div>

<div class="field">
<label class="label" for="password">Password</label>
<input id="password" class="input" placeholder="Password" type="password" autocomplete="current-password" />
</div>

<input id="website" class="input hp" type="text" tabindex="-1" autocomplete="off" aria-hidden="true" />

<label class="check-row" for="humanCheck">
<input id="humanCheck" class="checkbox" type="checkbox" />
<span class="helper">Verify you’re human before signing into your MSS account.</span>
</label>

<button id="btn" class="btn primary" type="button">Login</button>
<div class="status" id="msg"></div>
</div>

<div class="link-row">
<a href="./register.html">No account? Create one</a>
<a href="./token.html">Back to Scanner</a>
</div>
</section>
</div>
</div>

<div id="layoutShellFooter"></div>

<script type="module">
import { bindSessionUi, login } from "./assets/auth.js";

async function mountSharedShell() {
try {
const shellModule = await import("./assets/layout-shell.js");
const mountShell =
shellModule.mountLayoutShell ||
shellModule.renderLayoutShell ||
shellModule.initLayoutShell ||
shellModule.default;

if (typeof mountShell === "function") {
await mountShell({
activeNav: "",
pageLabel: "Login",
pageTitle: "Sign In To The MSS Intelligence Layer",
pageSubtitle: "Account access",
headerTargetId: "layoutShellHeader",
footerTargetId: "layoutShellFooter",
});
}
} catch (err) {
console.error("Shared shell mount failed:", err);
}
}

await mountSharedShell();

bindSessionUi({
sessionPillId: "sessionPill",
sessionDotId: "sessionDot",
sessionTextId: "sessionText",
logoutBtnId: "logoutBtn",
loggedOutHref: "./login.html",
loggedInHref: "./index.html#access",
onLogout() {
window.location.reload();
},
});

const $ = (id) => document.getElementById(id);

async function submit() {
$("msg").textContent = "Signing in…";
try {
await login({
email: $("email").value.trim(),
password: $("password").value.trim(),
humanCheck: $("humanCheck").checked,
website: $("website").value.trim(),
});
$("msg").textContent = "Success. Redirecting…";
setTimeout(() => { window.location.href = "./token.html"; }, 500);
} catch (e) {
$("msg").textContent = String(e?.message || e);
}
}

$("btn").addEventListener("click", submit);
$("password").addEventListener("keydown", (e) => {
if (e.key === "Enter") submit();
});
</script>
</body>
</html>
