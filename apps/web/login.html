<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MSS Protocol — Login</title>
<style>
:root{
--bg0:#05070c;
--bg1:#070a12;
--text:rgba(255,255,255,.92);
--muted:rgba(255,255,255,.68);
--muted2:rgba(255,255,255,.45);
--a:#00ffd1;
--b:#3aa0ff;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
color:var(--text);
background:
radial-gradient(1200px 700px at 15% -10%, rgba(0,255,209,.18), transparent 55%),
radial-gradient(900px 600px at 95% 10%, rgba(58,160,255,.16), transparent 50%),
linear-gradient(180deg, var(--bg0), var(--bg1));
}
.wrap{max-width:560px;margin:0 auto;padding:40px 18px 80px}
.card{
border:1px solid rgba(255,255,255,.12);
border-radius:20px;
padding:22px;
background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.035));
box-shadow:0 18px 60px rgba(0,0,0,.45);
}
h1{margin:0 0 10px}
p{color:var(--muted);line-height:1.6}
.input{
width:100%;
padding:12px 14px;
border-radius:14px;
border:1px solid rgba(255,255,255,.12);
background:rgba(0,0,0,.35);
color:#fff;
margin-top:10px;
outline:none;
}
.input:focus{
border-color:rgba(0,255,209,.24);
box-shadow:0 0 0 4px rgba(0,255,209,.10);
}
.btn{
margin-top:12px;
width:100%;
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,.12);
background:linear-gradient(135deg, rgba(0,255,209,.18), rgba(58,160,255,.14));
color:#fff;
font-weight:800;
cursor:pointer;
}
.btn:hover{filter:brightness(1.06)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}
.checkbox{
width:18px;
height:18px;
}
.muted{opacity:.78;font-size:12px;margin-top:10px;line-height:1.5}
.status{min-height:20px;margin-top:10px;font-size:13px}
a{color:#9ef;text-decoration:none}
.back{display:inline-block;margin-bottom:16px}
.hp{display:none !important}
.small-link{margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
<a class="back" href="./index.html">← Back</a>
<div class="card">
<h1>Login</h1>
<p>Sign in to manage alerts and access account-linked MSS features.</p>

<input id="email" class="input" placeholder="Email" type="email" autocomplete="email" />
<input id="password" class="input" placeholder="Password" type="password" autocomplete="current-password" />

<input id="website" class="input hp" type="text" tabindex="-1" autocomplete="off" aria-hidden="true" />

<div class="row">
<input id="humanCheck" class="checkbox" type="checkbox" />
<label for="humanCheck">Verify you’re human</label>
</div>

<button id="btn" class="btn" type="button">Login</button>
<div class="status" id="msg"></div>

<div class="muted small-link">No account? <a href="./register.html">Register</a></div>
<div class="muted"><a href="./token.html">Back to Scanner</a></div>
</div>
</div>

<script type="module">
import { login } from "./assets/auth.js";
const $ = (id) => document.getElementById(id);

async function submit() {
$("msg").textContent = "Signing in…";
try {
await login({
email: $("email").value.trim(),
password: $("password").value.trim(),
humanCheck: $("humanCheck").checked,
website: $("website").value.trim(),
});
$("msg").textContent = "Success. Redirecting…";
setTimeout(() => { window.location.href = "./token.html"; }, 500);
} catch (e) {
$("msg").textContent = String(e?.message || e);
}
}

$("btn").addEventListener("click", submit);
$("password").addEventListener("keydown", (e) => {
if (e.key === "Enter") submit();
});
</script>
</body>
</html>
