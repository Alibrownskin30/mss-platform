<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MSS Protocol Security Scan</title>

<meta property="og:title" content="MSS Protocol Security Scan" />
<meta property="og:description" content="Live token security scan by MSS Protocol." />
<meta property="og:image" content="https://www.mssprotocol.com/images/mss-share-card.png" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://www.mssprotocol.com/share/token.html" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="MSS Protocol Security Scan" />
<meta name="twitter:description" content="Live token security scan by MSS Protocol." />
<meta name="twitter:image" content="https://www.mssprotocol.com/images/mss-share-card.png" />

<script>
(async function () {
const params = new URLSearchParams(location.search);
const mint = params.get("mint");

if (!mint) {
location.replace("/token.html");
return;
}

function getApiBase() {
const hostname = location.hostname;

if (
hostname === "devnet.mssprotocol.com" ||
hostname === "www.devnet.mssprotocol.com"
) {
return "https://api.mssprotocol.com";
}

if (
hostname === "127.0.0.1" ||
hostname === "localhost" ||
location.port === "3000"
) {
return location.protocol + "//" + hostname + ":8787";
}

return "https://api.mssprotocol.com";
}

try {
const apiBase = getApiBase();

const r = await fetch(`${apiBase}/api/sol/share-summary/${encodeURIComponent(mint)}`);
const j = await r.json();

if (j?.ok) {
const title = "MSS Protocol Security Scan";
const desc = `$${j.symbol} • Risk: ${j.riskLabel} • Liquidity: ${j.liquidityText}`;
const currentShareUrl = `${location.origin}/share/token.html?mint=${encodeURIComponent(mint)}`;

const setMeta = (selector, attr, value) => {
const el = document.querySelector(selector);
if (el && value) el.setAttribute(attr, value);
};

setMeta('meta[property="og:title"]', "content", title);
setMeta('meta[property="og:description"]', "content", desc);
setMeta('meta[property="og:image"]', "content", j.imageUrl || "https://www.mssprotocol.com/images/mss-share-card.png");
setMeta('meta[property="og:url"]', "content", currentShareUrl);

setMeta('meta[name="twitter:title"]', "content", title);
setMeta('meta[name="twitter:description"]', "content", desc);
setMeta('meta[name="twitter:image"]', "content", j.imageUrl || "https://www.mssprotocol.com/images/mss-share-card.png");

document.title = title;
}
} catch {}

setTimeout(() => {
location.replace(`/token.html?mint=${encodeURIComponent(mint)}`);
}, 300);
})();
</script>
</head>
<body style="background:#070a12;color:#fff;font-family:system-ui;padding:24px">
Redirecting to MSS Protocol scan…
</body>
</html>
