<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="refresh" content="0; url=./launchpad.html" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#04070D" />
<title>MSS Protocol — Redirecting To Launchpad</title>
<meta
name="description"
content="Redirecting to MSS Protocol Launchpad."
/>

<style>
:root{
--bg0:#03060b;
--bg1:#070d16;
--bg2:#0b1320;
--text:#f4f8ff;
--muted:rgba(230,239,255,.70);
--line:rgba(96,180,255,.14);
--line-strong:rgba(96,180,255,.24);
--blue-1:#159cff;
--cyan-1:#36d7ff;
--steel-1:#8fa9c8;
--shadow-xl:0 28px 90px rgba(0,0,0,.54);
--sans:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}

*,
*::before,
*::after{
box-sizing:border-box;
}

html,
body{
width:100%;
min-height:100%;
margin:0;
}

body{
font-family:var(--sans);
color:var(--text);
display:grid;
place-items:center;
padding:24px;
background:
radial-gradient(920px 560px at 14% -12%, rgba(21,156,255,.15), transparent 56%),
radial-gradient(720px 420px at 100% 0%, rgba(54,215,255,.10), transparent 48%),
radial-gradient(640px 340px at 50% 100%, rgba(143,169,200,.06), transparent 62%),
linear-gradient(180deg, var(--bg0), var(--bg1) 44%, var(--bg2));
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:
linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.014) 1px, transparent 1px);
background-size:40px 40px;
mask-image:linear-gradient(180deg, rgba(0,0,0,.34), transparent 82%);
opacity:.24;
}

.card{
position:relative;
width:min(560px, 100%);
overflow:hidden;
border-radius:26px;
border:1px solid var(--line);
background:
radial-gradient(620px 220px at 0% 0%, rgba(21,156,255,.105), transparent 42%),
radial-gradient(520px 190px at 100% 0%, rgba(54,215,255,.065), transparent 40%),
linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.026));
box-shadow:
var(--shadow-xl),
0 0 26px rgba(21,156,255,.055);
padding:28px;
text-align:center;
}

.card::before{
content:"";
position:absolute;
inset:0;
pointer-events:none;
background:
linear-gradient(180deg, rgba(255,255,255,.04), transparent 28%),
linear-gradient(90deg, transparent, rgba(54,215,255,.06), transparent 42%);
}

.card::after{
content:"";
position:absolute;
left:0;
right:0;
top:0;
height:1px;
background:linear-gradient(90deg, transparent, rgba(54,215,255,.42), rgba(143,169,200,.20), transparent);
opacity:.95;
pointer-events:none;
}

.card > *{
position:relative;
z-index:1;
}

.kicker{
display:inline-flex;
align-items:center;
gap:10px;
min-height:32px;
padding:0 12px;
border-radius:999px;
border:1px solid rgba(74,165,255,.22);
background:linear-gradient(180deg, rgba(21,156,255,.13), rgba(255,255,255,.035));
color:rgba(255,255,255,.9);
font-size:11px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
box-shadow:0 0 16px rgba(21,156,255,.07);
}

.kicker::before{
content:"";
width:7px;
height:7px;
border-radius:999px;
background:var(--cyan-1);
box-shadow:0 0 0 6px rgba(54,215,255,.10), 0 0 14px rgba(54,215,255,.72);
flex:0 0 auto;
}

h1{
margin:18px 0 10px;
font-size:30px;
line-height:1;
letter-spacing:-.04em;
color:#fff;
}

p{
margin:0;
color:var(--muted);
font-size:14px;
line-height:1.65;
}

.actions{
display:flex;
justify-content:center;
margin-top:18px;
}

a{
display:inline-flex;
align-items:center;
justify-content:center;
min-height:44px;
padding:0 16px;
border-radius:14px;
border:1px solid var(--line-strong);
background:linear-gradient(135deg, rgba(21,156,255,.18), rgba(54,215,255,.09) 56%, rgba(143,169,200,.075));
color:#fff;
font-size:11px;
font-weight:900;
letter-spacing:.10em;
text-transform:uppercase;
text-decoration:none;
box-shadow:
0 12px 28px rgba(0,0,0,.22),
0 0 18px rgba(21,156,255,.07),
inset 0 1px 0 rgba(255,255,255,.04);
transition:.18s ease;
}

a:hover{
transform:translateY(-1px);
border-color:rgba(74,165,255,.32);
box-shadow:
0 14px 32px rgba(0,0,0,.26),
0 0 22px rgba(21,156,255,.10),
inset 0 1px 0 rgba(255,255,255,.04);
}

@media (max-width:520px){
body{
padding:16px;
}

.card{
padding:22px 18px;
border-radius:22px;
}

h1{
font-size:25px;
}
}
</style>

<script>
(function () {
const target = `./launchpad.html${window.location.search || ""}${window.location.hash || ""}`;
window.location.replace(target);
})();
</script>
</head>

<body>
<main class="card" aria-label="Redirecting to Launchpad">
<div class="kicker">MSS Protocol</div>
<h1>Redirecting To Launchpad</h1>
<p>
You are being moved to the MSS Launchpad command surface.
</p>

<div class="actions">
<a id="fallbackLink" href="./launchpad.html">Open Launchpad</a>
</div>
</main>

<script>
document.getElementById("fallbackLink").href =
`./launchpad.html${window.location.search || ""}${window.location.hash || ""}`;
</script>
</body>
</html>
